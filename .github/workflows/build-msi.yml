name: Build Windows MSI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PRODUCT_VERSION: 0.1.${{ github.run_number }}
  PYTHON_VERSION: "3.12"

jobs:
  build-msi:
    name: Build MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create CI config
        shell: pwsh
        run: |
          Copy-Item config.sample.yaml config.yaml -Force

      - name: Install and bundle FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          New-Item -ItemType Directory -Force vendor\ffmpeg | Out-Null
          Copy-Item (Get-Command ffmpeg).Source vendor\ffmpeg\ffmpeg.exe -Force
          Copy-Item (Get-Command ffprobe).Source vendor\ffmpeg\ffprobe.exe -Force

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q
          python -m py_compile app_server.py music_downloader.py imd_launcher.py

      - name: Build portable app folder
        shell: pwsh
        run: |
          pyinstaller packaging\IMD.spec --noconfirm --clean
          if (!(Test-Path dist\IMD\IMD.exe)) {
            throw "IMD.exe nao foi gerado."
          }

      - name: Smoke test packaged UI
        shell: pwsh
        run: |
          $app = Start-Process -FilePath dist\IMD\IMD.exe -ArgumentList @("--host","127.0.0.1","--port","8876") -PassThru
          try {
            Start-Sleep -Seconds 5
            $response = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8876/ -TimeoutSec 15
            if ($response.Content -notmatch "IMD Insane Music Downloader") {
              throw "A UI empacotada nao respondeu com o nome esperado."
            }
          } finally {
            Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress

      - name: Build MSI
        shell: pwsh
        run: |
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (!(Test-Path $wixBin)) {
            $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          }
          if (!(Test-Path $wixBin)) {
            throw "WiX Toolset nao encontrado."
          }
          New-Item -ItemType Directory -Force build\wix | Out-Null
          $msiPath = "dist\IMD-Insane-Music-Downloader-$env:PRODUCT_VERSION.msi"
          & "$wixBin\heat.exe" dir "dist\IMD" -cg AppFiles -dr INSTALLFOLDER -sreg -srd -gg -var var.SourceDir -out "packaging\harvest.wxs"
          & "$wixBin\candle.exe" -dSourceDir="$(Resolve-Path dist\IMD)" -dProductVersion="$env:PRODUCT_VERSION" -out "build\wix\\" "packaging\Product.wxs" "packaging\harvest.wxs"
          & "$wixBin\light.exe" `
            -sval `
            -out "$msiPath" `
            "build\wix\Product.wixobj" `
            "build\wix\harvest.wixobj"
          if (!(Test-Path $msiPath)) {
            throw "MSI nao foi gerado: $msiPath"
          }
          $msi = Get-Item $msiPath
          if ($msi.Length -lt 1000000) {
            throw "MSI gerado parece pequeno demais: $($msi.Length) bytes"
          }
          Write-Host "MSI gerado: $($msi.FullName) ($([math]::Round($msi.Length / 1MB, 2)) MB)"

      - name: Smoke test MSI install
        shell: pwsh
        run: |
          $msiPath = (Get-ChildItem dist\*.msi | Select-Object -First 1).FullName
          $installLog = "$(Resolve-Path dist)\install.log"
          $uninstallLog = "$(Resolve-Path dist)\uninstall.log"
          $installedExe = Join-Path $env:LOCALAPPDATA "IMD Insane Music Downloader\IMD.exe"
          $install = Start-Process msiexec.exe -ArgumentList @("/i", $msiPath, "/qn", "/norestart", "/L*v", $installLog) -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Instalacao MSI falhou com exit code $($install.ExitCode). Veja dist\install.log"
          }
          if (!(Test-Path $installedExe)) {
            throw "IMD.exe nao encontrado apos instalar MSI: $installedExe"
          }
          $uninstall = Start-Process msiexec.exe -ArgumentList @("/x", $msiPath, "/qn", "/norestart", "/L*v", $uninstallLog) -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "Desinstalacao MSI falhou com exit code $($uninstall.ExitCode). Veja dist\uninstall.log"
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: IMD-Insane-Music-Downloader-MSI
          if-no-files-found: error
          path: dist/*.msi

      - name: Upload packaging diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: IMD-packaging-diagnostics
          if-no-files-found: ignore
          path: |
            packaging/harvest.wxs
            build/wix/
            dist/install.log
            dist/uninstall.log

      - name: Attach MSI to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
